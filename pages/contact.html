<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - SALES Analytics</title>
    <link rel="stylesheet" href="../assets/css/main.css">
</head>

<body>
    <!-- Navigation Bar -->
    <nav>
        <a href="../index.html" class="logo">SALES</a>
        <ul>
            <li><a href="../index.html" class="nav-link" onclick="setActive(this)">Home</a></li>
            <li><a href="about.html" class="nav-link" onclick="setActive(this)">About</a></li>
            <li><a href="dashboard.html" class="nav-link" onclick="setActive(this)">DashBoard</a></li>
            <li><a href="story.html" class="nav-link" onclick="setActive(this)">Story</a></li>
            <li><a href="contact.html" class="nav-link active" onclick="setActive(this)">Contact</a></li>
        </ul>
        <a href="contact.html" class="get-started-btn">Get Started</a>
    </nav>

    <!-- Contact Section -->
    <section id="contact">
        <span class="section-label">CONTACT</span>
        <h2>CONTACT US</h2>
        <div class="section-divider"></div>

        <div class="contact-wrapper">
            <!-- Contact Information -->
            <div class="contact-info">
                <div class="contact-info-item">
                    <div class="contact-info-icon">📍</div>
                    <div class="contact-info-content">
                        <h3>Location:</h3>
                        <p>Gachibowli Circle, Gachibowli, Hyderabad, INDIA</p>
                    </div>
                </div>

                <div class="contact-info-item">
                    <div class="contact-info-icon">✉️</div>
                    <div class="contact-info-content">
                        <h3>Email:</h3>
                        <p>businesstore@example.com</p>
                    </div>
                </div>

                <div class="contact-info-item">
                    <div class="contact-info-icon">📱</div>
                    <div class="contact-info-content">
                        <h3>Call:</h3>
                        <p>89554 48855</p>
                    </div>
                </div>
            </div>

            <!-- Contact Form -->
            <div class="contact-form">
                <form id="contactForm" onsubmit="handleContactSubmit(event)">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="name">Your Name</label>
                            <input type="text" id="name" name="name" placeholder="Your Name" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Your Email</label>
                            <input type="email" id="email" name="email" placeholder="Your Email" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="subject">Subject</label>
                        <input type="text" id="subject" name="subject" placeholder="Subject" required>
                    </div>

                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" placeholder="Message" required></textarea>
                    </div>

                    <button type="submit" class="submit-btn">Send Message</button>
                </form>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 SALES Analytics Team. All rights reserved.</p>
    </footer>

    <script src="../assets/js/script.js"></script>
</body>

</html>
